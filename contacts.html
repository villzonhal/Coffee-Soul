<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Soul — Контакты</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        .contacts-page {
            padding: 20px 0 80px;
        }

        .contacts-title {
            text-align: center;
            margin-bottom: 30px;
        }

        .contacts-title h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .contacts-title p {
            color: #777;
        }

        .contacts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .contact-card {
            background: #fff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .contact-card i {
            font-size: 28px;
            color: #8B5A2B;
            margin-bottom: 10px;
        }

        .map-wrapper {
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: #fff;
        }

        #map {
            width: 100%;
            height: 600px;
        }

        .geo-status {
            padding: 15px;
            text-align: center;
            font-size: 14px;
            border-top: 1px solid #eee;
        }

        .geo-status.success { color: green; }
        .geo-status.error { color: red; }
        .geo-status.info { color: #555; }

        .geo-btn {
            display: block;
            margin: 15px auto;
            padding: 10px 18px;
            background: #8B5A2B;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        .geo-btn:hover {
            background: #6f431f;
        }

        @media (max-width: 768px) {
            #map {
                height: 420px;
            }
        }
    </style>
</head>

<body>

<header class="header">
    <div class="nav-container">
        <div class="logo">
            <span class="coffee">Coffee</span>
            <span class="soul">Soul</span>
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Главная</a></li>
            <li><a href="news.html">Новости</a></li>
            <li><a href="cards.html">Коллекция</a></li>
            <li><a href="contacts.html">Контакты</a></li>
            <li><a href="menu.html">Меню</a></li>
        </ul>
    </div>
</header>

<main class="contacts-page">

    <div class="contacts-title">
        <h1>Контакты</h1>
        <p>Мы на карте и всегда рядом</p>
    </div>

    <div class="contacts-grid">
        <div class="contact-card">
            <i class="fas fa-map-marker-alt"></i>
            <h3>Адрес</h3>
            <p>г. Пермь, ул. Магистральная, 89/2</p>
        </div>

        <div class="contact-card">
            <i class="fas fa-phone"></i>
            <h3>Телефон</h3>
            <p>+7 (495) 123-45-67</p>
        </div>

        <div class="contact-card">
            <i class="fas fa-clock"></i>
            <h3>Режим работы</h3>
            <p>08:00 — 23:00</p>
        </div>
    </div>

    <div class="map-wrapper">

        <div id="map"></div>

        <button class="geo-btn" id="findMeBtn">Найти меня</button>

        <div class="geo-status info" id="geoText">
            Нажмите «Найти меня», чтобы определить местоположение
        </div>

    </div>

</main>

<footer class="footer">
    <div class="footer-container">
        <div class="footer-section">
            <h4>Coffee Soul</h4>
            <p>Кофе с душой</p>
        </div>
    </div>
</footer>

<script src="https://api-maps.yandex.ru/2.1/?lang=ru_RU"></script>

<script>
const coffeeCoords = [58.016638, 55.965716];

let map;
let userPlacemark;
let accuracyCircle;
let watchId = null;

ymaps.ready(initMap);

function initMap() {
    map = new ymaps.Map("map", {
        center: coffeeCoords,
        zoom: 16,
        controls: ["zoomControl", "geolocationControl"]
    });

    const coffeePlacemark = new ymaps.Placemark(coffeeCoords, {
        hintContent: "Coffee Soul",
        balloonContent: "Мы здесь ☕"
    }, {
        preset: "islands#redIcon"
    });

    map.geoObjects.add(coffeePlacemark);

    document.getElementById("findMeBtn")
        .addEventListener("click", startGeo);

    setStatus("Готово. Нажмите «Найти меня»", "info");
}

function startGeo() {
    if (!navigator.geolocation) {
        setStatus("Геолокация не поддерживается", "error");
        return;
    }

    setStatus("Определяем местоположение...", "info");

    navigator.geolocation.getCurrentPosition(
        successGeo,
        errorGeo,
        {
            enableHighAccuracy: true,
            timeout: 12000,
            maximumAge: 0
        }
    );
}

function successGeo(position) {
    const lat = position.coords.latitude;
    const lon = position.coords.longitude;
    const accuracy = position.coords.accuracy;

    const userCoords = [lat, lon];

    if (accuracy > 2000) {
        setStatus("Нет точного GPS сигнала", "error");
        map.setCenter(coffeeCoords, 15);
        return;
    }

    if (userPlacemark) map.geoObjects.remove(userPlacemark);
    if (accuracyCircle) map.geoObjects.remove(accuracyCircle);

    userPlacemark = new ymaps.Placemark(userCoords, {
        hintContent: "Вы здесь",
        balloonContent: "Ваше местоположение"
    }, {
        preset: "islands#blueCircleDotIcon"
    });

    accuracyCircle = new ymaps.Circle(
        [userCoords, accuracy],
        {},
        {
            fillColor: "#1e88e5",
            fillOpacity: 0.15,
            strokeColor: "#1e88e5",
            strokeWidth: 2
        }
    );

    map.geoObjects.add(userPlacemark);
    map.geoObjects.add(accuracyCircle);

    const bounds = ymaps.util.bounds.fromPoints([
        coffeeCoords,
        userCoords
    ]);

    map.setBounds(bounds, {
        zoomMargin: 80,
        checkZoomRange: true
    });

    setStatus("Вы определены (точность ~" + Math.round(accuracy) + " м)", "success");
}

function errorGeo() {
    setStatus("Не удалось получить геолокацию", "error");
    map.setCenter(coffeeCoords, 16);
}

function setStatus(text, type) {
    const el = document.getElementById("geoText");
    el.textContent = text;
    el.className = "geo-status " + type;
}
</script>

</body>
</html>
